<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock title %}</title>

    <script src="{% static 'cdn/jquery-ui.min.js' %}" type='text/javascript'></script>
    <link href="{% static 'cdn/jquery-ui.min.css' %}" rel='stylesheet' type='text/css'>

    <!--Bootstrap-->
    <script src="{% static 'cdn/popper.min.js' %}"></script>
    <link href="{% static 'cdn/font-awesome.min.css' %}" rel='stylesheet' type='text/css'>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
 /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap');

/* ========================================
   CSS Variables - Light Mode (Default)
   ======================================== */
:root {
  /* Primary Colors */
  --primary-blue: #0070a0;
  --primary-blue-dark: #00577c;
  --primary-blue-soft: #2c90c9;
  --primary-blue-light: #1b9cca;

  /* Background Colors */
  --bg-primary: #ffffff;
  --bg-secondary: #f7f9fa;
  --bg-tertiary: #cce5f3;

  /* Text Colors */
  --text-primary: #1f1f1f;
  --text-secondary: #33383f;
  --text-muted: #626a72;
  --text-light: #99a4af;

  /* Border Colors */
  --border-color: #dee5eb;
  --border-light: #c2cdd8;

  /* Accent Colors */
  --accent-cream: #cce5f3;
  --accent-yellow: #faea73;
  --accent-pink: #f7cedc;
  --accent-cyan: #cceff6;

  /* Shadow */
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 5px 12px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 8px 20px rgba(0, 0, 0, 0.08);
  --shadow-hover: 0 12px 24px rgba(0, 0, 0, 0.12);

  /* Typography */
  --font-heading: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;

  /* Transitions */
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
}

/* ========================================
   Dark Mode Variables
   ======================================== */
[data-theme="dark"] {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;

  --text-primary: #ffffff;
  --text-secondary: #e2e8f0;
  --text-muted: #94a3b8;
  --text-light: #64748b;

  --border-color: #334155;
  --border-light: #475569;

  --accent-cream: #1e3a5f;

  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
  --shadow-md: 0 5px 12px rgba(0, 0, 0, 0.2);
  --shadow-lg: 0 8px 20px rgba(0, 0, 0, 0.3);
  --shadow-hover: 0 12px 24px rgba(0, 0, 0, 0.4);
}

/* ========================================
   Base Styles
   ======================================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background-color: var(--bg-secondary);
  color: var(--text-primary);
  line-height: 1.6;
  transition: background-color var(--transition-normal), color var(--transition-normal);
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  font-weight: 500;
  letter-spacing: -0.2px;
  color: var(--text-primary);
}

a {
  text-decoration: none;
  color: inherit;
  transition: color var(--transition-fast);
}

/* ========================================
   Sidebar Styles
   ======================================== */
.sidebar {
    min-height: 100vh;
    background: linear-gradient(180deg, var(--primary-blue) 0%, var(--primary-blue-dark) 100%);
    color: white;
    position: fixed;
    width: 260px;
    transition: all var(--transition-normal);
    box-shadow: var(--shadow-lg);
    z-index: 1000;
}

.sidebar .nav-link {
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 8px;
    border-radius: 8px;
    padding: 12px 18px;
    transition: all var(--transition-fast);
    font-weight: 500;
}

.sidebar .nav-link:hover,
.sidebar .nav-link.active {
    color: white;
    background-color: rgba(255, 255, 255, 0.15);
    transform: translateX(4px);
}

.sidebar .nav-link i {
    margin-right: 12px;
    width: 20px;
    text-align: center;
}

.sidebar-brand {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    font-weight: 600;
    color: white;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 2rem;
}

/* ========================================
   Main Content
   ======================================== */
.main-content {
    margin-left: 260px;
    padding: 2rem;
    transition: all var(--transition-normal);
}

/* ========================================
   Cards
   ======================================== */
.card {
    border: 1px solid var(--border-color);
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    transition: all var(--transition-fast);
    background-color: var(--bg-primary);
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.card-header {
    background-color: transparent;
    border-bottom: 1px solid var(--border-color);
    font-family: var(--font-heading);
    font-weight: 600;
    padding: 1.25rem 1.5rem;
}

.card-body {
    padding: 1.5rem;
}

[data-theme="dark"] .card {
    background-color: var(--bg-secondary);
    border-color: var(--border-color);
}

/* Stat Cards */
.stat-card {
    background-color: var(--bg-primary);
    text-align: center;
    padding: 1.5rem;
}

.stat-card .icon-wrapper {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 1.5rem;
}

.stat-card .icon-wrapper.text-primary {
    background-color: var(--accent-cream);
    color: var(--primary-blue) !important;
}

.stat-card .icon-wrapper.text-success {
    background-color: #d4edda;
    color: #198754 !important;
}

.stat-card .icon-wrapper.text-info {
    background-color: #cff4fc;
    color: #0dcaf0 !important;
}

.stat-card h6 {
    font-family: var(--font-body);
    font-size: 0.875rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.5rem;
}

.stat-card h3 {
    color: var(--primary-blue);
    font-size: 2rem;
    margin-bottom: 0;
}

/* ========================================
   Buttons
   ======================================== */
.btn-primary {
  background-color: var(--primary-blue);
  border-color: var(--primary-blue);
  padding: 0.75rem 1.5rem;
  font-weight: 500;
  border-radius: 8px;
  transition: all var(--transition-fast);
}

.btn-primary:hover {
  background-color: var(--primary-blue-dark);
  border-color: var(--primary-blue-dark);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.btn-outline-primary {
  color: var(--primary-blue);
  border-color: var(--primary-blue);
  background-color: transparent;
  padding: 0.5rem 1rem;
  font-weight: 500;
  border-radius: 8px;
  transition: all var(--transition-fast);
}

.btn-outline-primary:hover {
  background-color: var(--primary-blue);
  border-color: var(--primary-blue);
  color: white;
  transform: translateY(-2px);
}

.btn-outline-light {
    color: white;
    border-color: rgba(255, 255, 255, 0.3);
    transition: all var(--transition-fast);
}

.btn-outline-light:hover {
    background-color: rgba(255, 255, 255, 0.15);
    border-color: white;
    color: white;
}

/* ========================================
   Tables
   ======================================== */
.table {
    margin-bottom: 0;
}

.table thead {
    background-color: var(--bg-tertiary);
}

.table th {
    font-family: var(--font-heading);
    font-weight: 600;
    color: var(--primary-blue);
    border-bottom: 2px solid var(--border-color);
    padding: 1rem;
}

.table td {
    vertical-align: middle;
    border-color: var(--border-color);
    padding: 1rem;
    color: var(--text-secondary);
}

.table-hover tbody tr:hover {
    background-color: var(--bg-secondary);
}

/* ========================================
   Badges
   ======================================== */
.badge {
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 16px;
    font-size: 0.75rem;
}

.bg-primary-soft {
    background-color: var(--accent-cream) !important;
    color: var(--primary-blue) !important;
}

/* ========================================
   Filter Group
   ======================================== */
.filter-group {
    background-color: var(--bg-primary);
    padding: 1.5rem;
    border-radius: 12px;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border-color);
}

[data-theme="dark"] .filter-group {
    background-color: var(--bg-secondary);
    border-color: var(--border-color);
}

.search-box {
    position: relative;
}

.search-box input {
    padding-left: 2.5rem;
    border-radius: 8px;
}

.search-box i {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
}

/* ========================================
   Performance Bar
   ======================================== */
.performance-bar {
    height: 8px;
    border-radius: 4px;
    background: var(--bg-tertiary);
    overflow: hidden;
}

.performance-bar-inner {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s ease;
}

/* ========================================
   Text Utilities
   ======================================== */
.text-muted-custom {
    color: var(--text-muted) !important;
}

.bg-secondary-custom {
    background-color: var(--bg-secondary) !important;
}

/* ========================================
   Mobile Sidebar Toggle
   ======================================== */
.sidebar-toggle-btn {
    display: none;
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 1001;
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background-color: var(--primary-blue);
    color: white;
    border: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all var(--transition-fast);
    box-shadow: var(--shadow-md);
}

.sidebar-toggle-btn:hover {
    background-color: var(--primary-blue-dark);
    transform: scale(1.05);
}

.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    z-index: 998;
    opacity: 0;
    transition: opacity var(--transition-normal);
}

.sidebar-overlay.active {
    display: block;
    opacity: 1;
}

.sidebar.mobile-open {
    transform: translateX(0) !important;
    box-shadow: var(--shadow-hover);
}

/* ========================================
   Responsive Adjustments
   ======================================== */
@media (max-width: 991px) {
    .sidebar {
        width: 70px;
        overflow: hidden;
    }

    .sidebar .sidebar-brand,
    .sidebar .nav-link span {
        display: none;
    }

    .sidebar .nav-link {
        padding: 12px;
        text-align: center;
    }

    .sidebar .nav-link i {
        margin-right: 0;
    }

    .main-content {
        margin-left: 70px;
        padding: 1rem;
    }
}

@media (max-width: 767px) {
    .sidebar-toggle-btn {
        display: flex;
    }

    .main-content {
        margin-left: 0;
        padding: 1rem;
        padding-top: 4rem;
    }

    .sidebar {
        transform: translateX(-100%);
        width: 260px;
    }

    .sidebar.mobile-open {
        transform: translateX(0);
    }

    .sidebar .sidebar-brand,
    .sidebar .nav-link span {
        display: inline;
    }

    .sidebar .nav-link {
        padding: 12px 18px;
        text-align: left;
    }

    .sidebar .nav-link i {
        margin-right: 12px;
    }
}

/* ========================================
   Reduced Motion
   ======================================== */
@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}
    </style>
</head>

<body>

            <!-- Loading Spinner -->
    <div class="loading-spinner">
        <div class="spinner"></div>
    </div>

    <!-- Mobile Sidebar Toggle Button -->
    <button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="Toggle navigation">
        <i class="fas fa-bars fa-lg"></i>
    </button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column p-4">
        <div class="sidebar-brand mb-4">
            <i class="bi bi-shield-lock-fill"></i>
            <span>Admin</span>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a class="nav-link active" href="{% url 'admin_dashboard' %}">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link" href="{% url 'admin_doctors_list' %}">
                    <i class="fas fa-user-md"></i>
                    <span>Doctors</span>
                </a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link" href="{% url 'admin_patients_list' %}">
                    <i class="fas fa-users"></i>
                    <span>Patients</span>
                </a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link" href="{% url 'admin_appointments_list' %}">
                    <i class="fas fa-calendar-check"></i>
                    <span>Appointments</span>
                </a>
            </li>
        </ul>
        <div class="mt-auto pt-4">
            <a href="{% url 'login' %}" class="btn btn-outline-light w-100 fw-bold" id="logoutBtn" style="border-radius: 8px;">
                <i class="fas fa-sign-out-alt me-2"></i>Logout
            </a>
        </div>
    </div>

    {% block content %}
    {% endblock content %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Mobile Sidebar Toggle Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const sidebar = document.querySelector('.sidebar');
            const icon = sidebarToggle ? sidebarToggle.querySelector('i') : null;
            
            // Toggle sidebar
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    sidebar.classList.toggle('mobile-open');
                    sidebarOverlay.classList.toggle('active');
                    
                    // Toggle icon between bars and times (X)
                    if (icon) {
                        if (sidebar.classList.contains('mobile-open')) {
                            icon.classList.remove('fa-bars');
                            icon.classList.add('fa-times');
                        } else {
                            icon.classList.remove('fa-times');
                            icon.classList.add('fa-bars');
                        }
                    }
                });
            }
            
            // Close sidebar when clicking overlay
            if (sidebarOverlay) {
                sidebarOverlay.addEventListener('click', function() {
                    sidebar.classList.remove('mobile-open');
                    sidebarOverlay.classList.remove('active');
                    if (icon) {
                        icon.classList.remove('fa-times');
                        icon.classList.add('fa-bars');
                    }
                });
            }
            
            // Close sidebar when clicking a nav link (mobile only)
            const navLinks = document.querySelectorAll('.sidebar .nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 767) {
                        sidebar.classList.remove('mobile-open');
                        sidebarOverlay.classList.remove('active');
                        if (icon) {
                            icon.classList.remove('fa-times');
                            icon.classList.add('fa-bars');
                        }
                    }
                });
            });
            
            // Handle window resize
            window.addEventListener('resize', function() {
                if (window.innerWidth > 767) {
                    sidebar.classList.remove('mobile-open');
                    sidebarOverlay.classList.remove('active');
                    if (icon) {
                        icon.classList.remove('fa-times');
                        icon.classList.add('fa-bars');
                    }
                }
            });
        });
    </script>
</body>
</html>
