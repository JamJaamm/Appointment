{% extends "admin_header_footer.html" %}
{% load static %}

{% block title %}Edit Appointment{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="container py-4">
  <div class="card p-4">
    <h3 class="mb-3"><i class="fas fa-edit me-2 text-primary"></i>Edit Appointment</h3>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Doctor</label>
          <select name="doctor" class="form-select" required>
            {% for doc in doctors %}
              <option value="{{ doc.id }}" {% if appointment.doctor.id == doc.id %}selected{% endif %}>Dr. {{ doc.get_full_name }} {% if doc.doctor %} - {{ doc.doctor.speciality }}{% endif %}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Patient</label>
          <select name="patient" class="form-select" required>
            {% for pat in patients %}
              <option value="{{ pat.id }}" {% if appointment.patient.id == pat.id %}selected{% endif %}>{{ pat.user.get_full_name }} ({{ pat.user.email }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Date</label>
          <input type="date" name="appointment_date" class="form-control" value="{{ appointment_date }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Time</label>
          <input type="time" name="appointment_time" class="form-control" value="{{ appointment_time }}" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Duration (minutes)</label>
          <input type="number" name="duration" class="form-control" value="{{ appointment.duration }}" min="10" max="480">
        </div>

        <div class="col-md-6">
          <label class="form-label">Status</label>
          <select name="status" class="form-select">
            {% for key, label in appointment._meta.get_field('status').choices %}
              <option value="{{ key }}" {% if appointment.status == key %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Admin Approval Status</label>
          <select name="admin_status" class="form-select">
            <option value="pending" {% if appointment.admin_status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="approved" {% if appointment.admin_status == 'approved' %}selected{% endif %}>Approved</option>
            <option value="rejected" {% if appointment.admin_status == 'rejected' %}selected{% endif %}>Rejected</option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label">Reason</label>
          <textarea name="reason" class="form-control" rows="3">{{ appointment.reason }}</textarea>
        </div>

        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="4">{{ appointment.notes }}</textarea>
        </div>

      </div>

      <div class="mt-4 d-flex gap-2">
        <button class="btn btn-primary" type="submit"><i class="fas fa-save me-2"></i>Save Changes</button>
        <a href="{% url 'admin_appointments_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
